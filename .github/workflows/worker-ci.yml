name: Worker CI/CD

on:
  push:
    branches: [main, staging]
    paths:
      - 'worker/**'
      - '.github/workflows/worker-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'worker/**'

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/three-tier-worker

jobs:
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        working-directory: worker
        run: flake8 worker.py --max-line-length=120 --ignore=E501,W503

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push'
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          file: ./worker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-infra:
    name: Update Image Tag in Infra Repo
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout infra repository
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.INFRA_REPO }}
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: infra

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update worker image tag
        run: |
          NEW_TAG="${{ secrets.DOCKERHUB_USERNAME }}/three-tier-worker:sha-$(echo ${{ github.sha }} | cut -c1-7)"
          yq e -i '.spec.template.spec.containers[0].image = "'$NEW_TAG'"' \
            infra/k8s/worker/deployment.yaml
          echo "Updated worker image to: $NEW_TAG"

      - name: Commit and push
        run: |
          cd infra
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/worker/deployment.yaml
          git diff --staged --quiet || git commit -m "ci: update worker image tag to sha-$(echo ${{ github.sha }} | cut -c1-7) [skip ci]"
          git push
