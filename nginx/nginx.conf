# ─────────────────────────────────────────────────────────────
#  Three-Tier Application — Nginx Reverse Proxy Config
#  File: /etc/nginx/sites-available/three-tier-application
#
#  Routes:
#    /api/*    → Backend  (Node.js on :5000)
#    /health   → Backend  (health check)
#    /*        → Frontend (Next.js  on :3000)
# ─────────────────────────────────────────────────────────────

# ── Upstream definitions ─────────────────────────────────────
upstream backend {
    server 127.0.0.1:5000;
    keepalive 64;
}

upstream frontend {
    server 127.0.0.1:3000;
    keepalive 64;
}

# ─────────────────────────────────────────────────────────────
#  HTTP Server (port 80)
#  - For local/IP use: serves the app directly
#  - For domain use:   redirects to HTTPS (see SSL section below)
# ─────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;                         # accepts any hostname / IP
    # server_name yourdomain.com;          # ← uncomment + set for production

    # ── Logging ─────────────────────────────
    access_log  /var/log/nginx/three-tier-access.log;
    error_log   /var/log/nginx/three-tier-error.log;

    # ── Security headers ─────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"    always;
    add_header X-Content-Type-Options   "nosniff"       always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    # ── Compression ──────────────────────────
    gzip on;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;

    # ── File upload limit ─────────────────────
    client_max_body_size 10M;

    # ── /api/* → Backend API ─────────────────
    location /api/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── /health → Backend health check ───────
    location /health {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log         off;            # skip logging health checks
    }

    # ── /_next/static/* → Next.js assets ─────
    #    Long cache — these files have content hashes in their names
    location /_next/static/ {
        proxy_pass       http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header       Cache-Control "public, max-age=31536000, immutable";
    }

    # ── /* → Frontend (Next.js app) ───────────
    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;

        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
    }
}

